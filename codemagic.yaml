workflows:
  bluebay-ios:
    name: BlueBay Wallet iOS
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    working_directory: mobile
    scripts:
      - flutter pub get
      - flutter build ios --release --no-codesign
      - cd build/ios/iphoneos && mkdir -p Payload && cp -R Runner.app Payload && zip -r BlueBayWallet.ipa Payload && mv BlueBayWallet.ipa ../..
    artifacts:
      - mobile/build/ios/BlueBayWallet.ipa
