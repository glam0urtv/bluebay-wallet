workflows:
  bluebay-ios:
    name: BlueBay Wallet iOS
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    working_directory: mobile
    scripts:
      - flutter pub get
      - flutter build ios --release --no-codesign
      - cd build/ios/iphoneos && zip -r $FCI_EXPORT_DIR/BlueBayWallet.app.zip Runner.app
      - echo "IPA ready at $FCI_EXPORT_DIR/BlueBayWallet.app.zip"
    artifacts:
      - BlueBayWallet.app.zip
