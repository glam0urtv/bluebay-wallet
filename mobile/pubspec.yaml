name: virtual_wallet
description: Virtual Wallet - Loyalty Token System with NFC & QR
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  provider: ^6.1.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.0
  nfc_manager: ^3.5.0
  flutter_nfc_kit: ^3.6.2
  google_fonts: ^6.2.0
  flutter_svg: ^2.0.0
  intl: ^0.19.0
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
