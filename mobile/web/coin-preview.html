<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BlueBay Token</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0f0f1a 50%, #000011 100%);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; perspective: 1400px; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            user-select: none; -webkit-user-select: none;
        }
        .scene { text-align: center; }
        .balance-label { color: #a78bfa; font-size: 13px; letter-spacing: 3px; font-weight: 600; margin-bottom: 4px; }
        .balance-amount { color: #fff; font-size: 54px; font-weight: 900; text-shadow: 0 0 60px rgba(124,58,237,0.5); }
        .balance-symbol { color: #a78bfa; font-size: 14px; letter-spacing: 2px; margin-bottom: 48px; }

        .coin-container {
            width: 260px; height: 260px; margin: 0 auto; cursor: grab;
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.8)) drop-shadow(0 0 100px rgba(212,175,55,0.25));
        }
        .coin-container:active { cursor: grabbing; }
        .coin { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; }

        /* Reeded edge layers */
        .edge-layer {
            position: absolute; border-radius: 50%;
            background: linear-gradient(to right, #3a2000, #a07020, #d4af37, #a07020, #3a2000);
            border: 1px solid #553800;
            transform-origin: center center;
        }
        .face {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            backface-visibility: hidden;
            background: radial-gradient(circle at 35% 35%, #fff8dc 0%, #f5e6a0 15%, #d4af37 40%, #b8860b 70%, #8b6914 100%);
            border: 7px double #73530c;
            box-sizing: border-box;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        .face::before {
            content: ''; position: absolute; inset: 10px; border-radius: 50%;
            border: 3px solid rgba(255,215,0,0.3); z-index: 3;
        }
        .face::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(135deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.3) 48%, rgba(255,255,255,0.02) 52%, rgba(255,255,255,0) 70%);
            z-index: 4; pointer-events: none;
        }
        .front { transform: rotateY(0deg) translateZ(0px); }
        .back { transform: rotateY(180deg) translateZ(0px); }
        .face img {
            width: 60%; height: 60%; object-fit: cover; border-radius: 50%; z-index: 1;
        }
        .gold-wash {
            position: absolute; width: 60%; height: 60%; border-radius: 50%;
            background: radial-gradient(circle, rgba(212,175,55,0.08) 0%, rgba(139,105,20,0.25) 100%);
            z-index: 2; pointer-events: none;
        }
        .engrave {
            position: absolute; width: 62%; height: 62%; border-radius: 50%;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.5); z-index: 1; pointer-events: none;
        }
        .shadow-floor {
            width: 180px; height: 28px; margin: 30px auto 0;
            background: radial-gradient(ellipse, rgba(0,0,0,0.5) 0%, transparent 70%);
            border-radius: 50%;
        }
        .hint { color: rgba(255,255,255,0.25); font-size: 11px; margin-top: 20px; }
    </style>
</head>
<body>
<div class="scene">
    <div class="balance-label">BALANCE</div>
    <div class="balance-amount">2,100</div>
    <div class="balance-symbol">BLUEBAY TOKEN</div>

    <div class="coin-container" id="container">
        <div class="coin" id="coin">
            <!-- Edge layers -->
            <div class="edge-layer" style="width:100%;height:100%;transform:translateZ(-12px) scale(1.04)"></div>
            <div class="edge-layer" style="width:100%;height:100%;transform:translateZ(-10px) scale(1.035)"></div>
            <div class="edge-layer" style="width:100%;height:100%;transform:translateZ(-8px) scale(1.03)"></div>
            <div class="edge-layer" style="width:100%;height:100%;transform:translateZ(-6px) scale(1.025)"></div>
            <div class="edge-layer" style="width:100%;height:100%;transform:translateZ(-4px) scale(1.018)"></div>
            <div class="edge-layer" style="width:100%;height:100%;transform:translateZ(-2px) scale(1.01)"></div>
            <div class="edge-layer" style="width:100%;height:100%;transform:translateZ(0px) scale(1.0)"></div>
            <div class="edge-layer" style="width:100%;height:100%;transform:translateZ(2px) scale(1.01)"></div>
            <div class="edge-layer" style="width:100%;height:100%;transform:translateZ(4px) scale(1.018)"></div>
            <div class="edge-layer" style="width:100%;height:100%;transform:translateZ(6px) scale(1.025)"></div>
            <div class="edge-layer" style="width:100%;height:100%;transform:translateZ(8px) scale(1.03)"></div>
            <div class="edge-layer" style="width:100%;height:100%;transform:translateZ(10px) scale(1.035)"></div>
            <div class="edge-layer" style="width:100%;height:100%;transform:translateZ(12px) scale(1.04)"></div>

            <div class="face front">
                <div class="engrave"></div>
                <img src="bluebay.jpg" alt="BlueBay">
                <div class="gold-wash"></div>
            </div>
            <div class="face back">
                <div class="engrave"></div>
                <img src="bluebay.jpg" alt="BlueBay">
                <div class="gold-wash"></div>
            </div>
        </div>
    </div>
    <div class="shadow-floor"></div>
    <div class="hint">swipe to spin</div>
</div>

<script>
    const coin = document.getElementById('coin'), container = document.getElementById('container');
    let angle = 0, auto = true, speed = 40, lastTime = null;
    let dragging = false, startX = 0, startAngle = 0, velocity = 0, lastX = 0, lastT = 0;

    function update(a) { coin.style.transform = 'rotateY(' + a + 'deg)'; }

    function animate(t) {
        if (!lastTime) lastTime = t;
        const dt = (t - lastTime) / 1000; lastTime = t;
        if (!dragging && auto) angle += speed * dt;
        else if (!dragging && !auto) { angle += velocity * dt; velocity *= 0.95; if (Math.abs(velocity) < 1) { velocity = 0; auto = true; } }
        update(angle); requestAnimationFrame(animate);
    }

    function getX(e) { return e.touches ? e.touches[0].clientX : e.clientX; }

    container.addEventListener('mousedown', e => { dragging=true; auto=false; velocity=0; startX=getX(e); startAngle=angle; lastX=startX; lastT=performance.now(); e.preventDefault(); });
    window.addEventListener('mousemove', e => { if(!dragging)return; const x=getX(e); angle=startAngle-(x-startX)*1.5; const n=performance.now(),dt=(n-lastT)/1000; if(dt>0.01)velocity=-(x-lastX)/dt*1.5; lastX=x;lastT=n; });
    window.addEventListener('mouseup', () => { dragging=false; if(Math.abs(velocity)<20){velocity=0;auto=true;} });
    container.addEventListener('touchstart', e => { dragging=true; auto=false; velocity=0; startX=getX(e); startAngle=angle; lastX=startX; lastT=performance.now(); }, {passive:true});
    window.addEventListener('touchmove', e => { if(!dragging)return; const x=getX(e); angle=startAngle-(x-startX)*1.5; const n=performance.now(),dt=(n-lastT)/1000; if(dt>0.01)velocity=-(x-lastX)/dt*1.5; lastX=x;lastT=n; }, {passive:true});
    window.addEventListener('touchend', () => { dragging=false; if(Math.abs(velocity)<20){velocity=0;auto=true;} });

    requestAnimationFrame(animate);
</script>
</body>
</html>
